name: Metrics
on:
  # Schedule daily updates
  schedule: [{ cron: "0 0 * * *" }]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: { branches: ["main", "dev"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@master
        with:
          filename: metrics-head.svg
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: Asia/Manila
          base: header
          base_indepth: yes
          config_padding: 0, 0
      - uses: lowlighter/metrics@master
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: Asia/Manila
          base: activity, community, repositories
          base_indepth: yes
          config_order: base.repositories, habits, base.activity, base.community
          config_padding: 0, 0
      - uses: lowlighter/metrics@master
        with:
          filename: metrics-foot.svg
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: Asia/Manila
          base: metadata
          base_indepth: yes
          config_padding: 0, 16px
      - uses: lowlighter/metrics@master
        with:
          filename: metrics-lang.svg
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: Asia/Manila
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: recently-used
          plugin_languages_limit: 6
          plugin_languages_analysis_timeout_repositories: 15
          plugin_languages_recent_categories: data, markup, programming, prose
          plugin_languages_recent_days: 365
          # plugin_languages_details: lines, bytes-size, percentage
          # config_order: achievements, base.repositories, languages, habits, base.activity, base.community, base.metadata
          config_padding: 0, 16px
