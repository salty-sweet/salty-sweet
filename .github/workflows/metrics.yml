name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["main", "dev"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: Asia/Manila
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          plugin_habits: yes
          plugin_habits_charts: no
          plugin_habits_facts: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: detailed
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_threshold: 2%
          plugin_languages_analysis_timeout_repositories: 15
          plugin_languages_details: lines, bytes-size, percentage
          plugin_licenses: yes
          plugin_licenses_setup: bash -c '[[ -f package.json ]] && npm ci || true'
          plugin_licenses_legal: no
          plugin_licenses_ratio: yes
          config_order: base.header, achievements, base.repositories, languages, base.activity, base.community, habits, licenses, base.metadata
